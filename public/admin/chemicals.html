<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VMS - İlaç Stok Yönetimi</title>
    <link rel="stylesheet" href="/css/main.css">
</head>
<body>
<aside class="sidebar">
    <button class="sidebar-close-btn" onclick="document.querySelector('.sidebar').classList.remove('open')">✕</button>
    <div class="sidebar-header"><div class="logo">🦟 Vektörle Mücadele<br>Yönetim Sistemi</div><div class="sub">Sivas Belediyesi</div></div>
    <nav class="sidebar-nav">
        <div class="nav-section">Ana Menü</div>
        <a href="/admin/dashboard" class="nav-item"><span class="icon">📊</span> Ana Ekran</a>
        <a href="/admin/sessions" class="nav-item"><span class="icon">💉</span> İlaçlama Kayıtları</a>
        <a href="/admin/planning" class="nav-item"><span class="icon">🗺️</span> Rota Planlama</a>
        <div class="nav-section">Yönetim</div>
        <a href="/admin/vehicles" class="nav-item"><span class="icon">🚐</span> Araçlar</a>
        <a href="/admin/personnel" class="nav-item"><span class="icon">👥</span> Personel</a>
        <a href="/admin/chemicals" class="nav-item active"><span class="icon">🧪</span> İlaç Stok</a>
        <div class="nav-section">İzleme</div>
        <a href="/admin/reports" class="nav-item"><span class="icon">📈</span> Raporlar</a>
        <a href="/admin/citizen-reports" class="nav-item"><span class="icon">📋</span> Vatandaş İhbar</a>
    </nav>
    <div class="sidebar-footer"><a href="#" onclick="logout()" style="color:var(--danger);text-decoration:none;font-size:11px;">🚪 Çıkış</a></div>
</aside>
<div class="main-content">
    <header class="topbar">
        <div class="topbar-title">
            <button class="mobile-nav-toggle" onclick="document.querySelector('.sidebar').classList.toggle('open')">☰</button>
            🧪 İlaç Stok Yönetimi
        </div>
        <div style="display:flex;gap:8px;">
            <button class="btn btn-success" onclick="openNewChemical()">+ Yeni İlaç Ekle</button>
            <button class="btn btn-primary" onclick="openAddStock()">+ Stok Girişi</button>
        </div>
    </header>
    <div class="page-content">
        <div class="stats-grid" id="stockCards"></div>
        <div class="card">
            <div class="card-header"><span class="card-title">İlaç Envanteri</span></div>
            <div class="table-container">
                <table>
                    <thead><tr><th>İlaç Adı</th><th>Tür</th><th>Stok</th><th>Min Uyarı</th><th>Durum</th><th>İşlem</th></tr></thead>
                    <tbody id="chemTable"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- Stock-In Modal -->
<div class="modal-overlay" id="stockModal">
    <div class="modal">
        <div class="modal-header">
            <div class="modal-title">📦 Stok Girişi</div>
            <button class="modal-close" onclick="document.getElementById('stockModal').classList.remove('active')">&times;</button>
        </div>
        <form id="stockForm">
            <div class="form-group">
                <label class="form-label">İlaç</label>
                <select class="form-select" id="stockChemical" required></select>
            </div>
            <div class="form-group">
                <label class="form-label">Miktar (lt)</label>
                <input type="number" class="form-input" id="stockAmount" step="0.1" required>
            </div>
            <div class="form-group">
                <label class="form-label">Açıklama</label>
                <input type="text" class="form-input" id="stockDesc" placeholder="Tedarikçi, fatura no, vs.">
            </div>
            <div style="display:flex;gap:12px;justify-content:flex-end;margin-top:16px;">
                <button type="button" class="btn btn-outline" onclick="document.getElementById('stockModal').classList.remove('active')">İptal</button>
                <button type="submit" class="btn btn-success">Ekle</button>
            </div>
        </form>
    </div>
</div>

<!-- New/Edit Chemical Modal -->
<div class="modal-overlay" id="chemicalModal">
    <div class="modal">
        <div class="modal-header">
            <div class="modal-title" id="chemicalModalTitle">🧪 Yeni İlaç Ekle</div>
            <button class="modal-close" onclick="document.getElementById('chemicalModal').classList.remove('active')">&times;</button>
        </div>
        <form id="chemicalForm">
            <input type="hidden" id="chemEditId">
            <div class="form-group">
                <label class="form-label">İlaç Adı *</label>
                <input type="text" class="form-input" id="chemName" required placeholder="Örn: Aqua K-Othrine">
            </div>
            <div class="form-group">
                <label class="form-label">Tür *</label>
                <select class="form-select" id="chemType" required>
                    <option value="sivrisinek">Sivrisinek</option>
                    <option value="karasinek">Karasinek</option>
                    <option value="larvasit">Larvasit</option>
                    <option value="genel">Genel</option>
                </select>
            </div>
            <div class="grid-2">
                <div class="form-group">
                    <label class="form-label">Başlangıç Stok (lt)</label>
                    <input type="number" class="form-input" id="chemStock" step="0.1" value="0">
                </div>
                <div class="form-group">
                    <label class="form-label">Min Stok Uyarı (lt)</label>
                    <input type="number" class="form-input" id="chemMinAlert" step="0.1" value="50">
                </div>
            </div>
            <div style="display:flex;gap:12px;justify-content:flex-end;margin-top:16px;">
                <button type="button" class="btn btn-outline" onclick="document.getElementById('chemicalModal').classList.remove('active')">İptal</button>
                <button type="submit" class="btn btn-primary" id="chemicalSubmitBtn">Kaydet</button>
            </div>
        </form>
    </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script>
const TOKEN = localStorage.getItem('vms_token');
const USER = JSON.parse(localStorage.getItem('vms_user') || '{}');
if (!TOKEN || USER.role !== 'admin') {
    localStorage.clear();
    window.location.href = '/';
}
function logout() { localStorage.clear(); window.location.href = '/'; }

async function api(url, opts={}) {
    const res = await fetch(url, { ...opts, headers: { 'Authorization': 'Bearer ' + TOKEN, 'Content-Type': 'application/json', ...opts.headers } });
    if (!res.ok) {
        const errData = await res.json().catch(() => ({}));
        throw new Error(errData.error || errData.message || 'Sunucu hatası: ' + res.status);
    }
    return res.json();
}

function toast(msg,type='info'){const c=document.getElementById('toastContainer');const t=document.createElement('div');t.className=`toast toast-${type}`;t.textContent=msg;c.appendChild(t);setTimeout(()=>t.remove(),4000);}

async function load() {
    const chems = await api('/api/chemicals');
    const colors = ['blue','green','orange','purple','blue'];
    document.getElementById('stockCards').innerHTML = chems.map((c,i) => {
        const low = c.stock_amount <= c.min_stock_alert;
        return `<div class="stat-card ${low ? 'orange' : colors[i%5]}">
            <div class="stat-icon ${low ? 'orange' : colors[i%5]}">${low ? '⚠️' : '🧪'}</div>
            <div>
                <div class="stat-value" style="font-size:20px;">${c.stock_amount} lt</div>
                <div class="stat-label">${c.name}</div>
                <div class="stat-label">${c.type}</div>
            </div>
        </div>`;
    }).join('');

    document.getElementById('chemTable').innerHTML = chems.map(c => {
        const low = c.stock_amount <= c.min_stock_alert;
        const safeName = (c.name || '').replace(/'/g, "\\'").replace(/"/g, '&quot;');
        return `<tr>
            <td><strong>${c.name}</strong></td>
            <td><span class="badge badge-info">${c.type}</span></td>
            <td style="font-weight:600;${low?'color:var(--danger)':''}">${c.stock_amount} lt</td>
            <td>${c.min_stock_alert} lt</td>
            <td><span class="badge ${low?'badge-danger':'badge-success'}">${low?'⚠ Düşük':'✓ Yeterli'}</span></td>
            <td>
                <div style="display:flex;gap:4px;align-items:center;">
                    <button class="btn btn-sm btn-outline" onclick="addStockFor(${c.id},'${safeName}')">+ Ekle</button>
                    <button class="btn btn-sm btn-outline" style="color:var(--accent);border-color:rgba(59,130,246,0.3)" onclick="openEditChemical(${c.id},'${safeName}','${c.type}',${c.stock_amount},${c.min_stock_alert})">✏️ Düzenle</button>
                    <button class="btn btn-sm btn-outline btn-danger" style="padding:2px 6px;color:var(--danger);border-color:rgba(239,68,68,0.2)" onclick="deleteChemical(${c.id},'${safeName}')">🗑️</button>
                </div>
            </td>
        </tr>`;
    }).join('');
}

function openAddStock() {
    api('/api/chemicals').then(chems => {
        document.getElementById('stockChemical').innerHTML = chems.map(c => `<option value="${c.id}">${c.name} (${c.stock_amount}lt)</option>`).join('');
        document.getElementById('stockModal').classList.add('active');
    });
}

function addStockFor(id, name) {
    document.getElementById('stockChemical').innerHTML = `<option value="${id}">${name}</option>`;
    document.getElementById('stockModal').classList.add('active');
}

document.getElementById('stockForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    try {
        await api(`/api/chemicals/${document.getElementById('stockChemical').value}/stock-in`, {
            method: 'POST',
            body: JSON.stringify({ amount: parseFloat(document.getElementById('stockAmount').value), description: document.getElementById('stockDesc').value })
        });
        document.getElementById('stockModal').classList.remove('active');
        toast('Stok eklendi', 'success');
        load();
    } catch(err) {
        toast('Hata: ' + err.message, 'error');
    }
});

// ─── New Chemical ───
function openNewChemical() {
    document.getElementById('chemicalModalTitle').textContent = '🧪 Yeni İlaç Ekle';
    document.getElementById('chemicalSubmitBtn').textContent = 'Kaydet';
    document.getElementById('chemEditId').value = '';
    document.getElementById('chemName').value = '';
    document.getElementById('chemType').value = 'sivrisinek';
    document.getElementById('chemStock').value = '0';
    document.getElementById('chemMinAlert').value = '50';
    document.getElementById('chemicalModal').classList.add('active');
}

// ─── Edit Chemical ───
function openEditChemical(id, name, type, stock, minAlert) {
    document.getElementById('chemicalModalTitle').textContent = '✏️ İlaç Düzenle';
    document.getElementById('chemicalSubmitBtn').textContent = 'Güncelle';
    document.getElementById('chemEditId').value = id;
    document.getElementById('chemName').value = name;
    document.getElementById('chemType').value = type;
    document.getElementById('chemStock').value = stock;
    document.getElementById('chemMinAlert').value = minAlert;
    document.getElementById('chemicalModal').classList.add('active');
}

document.getElementById('chemicalForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const editId = document.getElementById('chemEditId').value;
    const body = {
        name: document.getElementById('chemName').value,
        type: document.getElementById('chemType').value,
        stock_amount: parseFloat(document.getElementById('chemStock').value) || 0,
        min_stock_alert: parseFloat(document.getElementById('chemMinAlert').value) || 50
    };
    try {
        if (editId) {
            await api(`/api/chemicals/${editId}`, { method: 'PUT', body: JSON.stringify(body) });
            toast('İlaç güncellendi', 'success');
        } else {
            await api('/api/chemicals', { method: 'POST', body: JSON.stringify(body) });
            toast('Yeni ilaç eklendi', 'success');
        }
        document.getElementById('chemicalModal').classList.remove('active');
        load();
    } catch(err) {
        toast('Hata: ' + err.message, 'error');
    }
});

// ─── Delete Chemical ───
async function deleteChemical(id, name) {
    if (!confirm(`"${name}" ilacını silmek istediğinize emin misiniz?`)) return;
    try {
        await api(`/api/chemicals/${id}`, { method: 'DELETE' });
        toast('İlaç silindi', 'success');
        load();
    } catch(err) {
        toast('Hata: ' + err.message, 'error');
    }
}

load();
</script>
</body>
</html>
